<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="100%" height="360" style="background: #0d1117; border-radius: 12px; font-family: 'Fira Code', 'Segoe UI', monospace;">
  <!-- Styling -->
  <style>
    @keyframes rotate-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rotate-ccw {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes pulse {
      0%, 100% { r: 24; opacity: 0.8; filter: drop-shadow(0 0 8px #f85d7f); }
      50% { r: 28; opacity: 1; filter: drop-shadow(0 0 16px #f85d7f); }
    }
    @keyframes pulse-green {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    .orbit-cw {
      animation: rotate-cw 20s linear infinite;
      transform-origin: 180px 180px;
    }
    .orbit-ccw {
      animation: rotate-ccw 15s linear infinite;
      transform-origin: 180px 180px;
    }
    .pulse-core {
      animation: pulse 3s ease-in-out infinite;
    }
    .blink-cursor {
      animation: blink 1s step-end infinite;
    }
  </style>

  <!-- Definitions for gradients -->
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f85d7f" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
  </defs>

  <!-- Background Box -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="12" stroke="url(#neonGrad)" stroke-width="2.5" />

  <!-- LEFT SIDE: TECH ORBIT -->
  <!-- Orbit Circles -->
  <circle cx="180" cy="180" r="120" fill="none" stroke="#334155" stroke-dasharray="6 6" />
  <circle cx="180" cy="180" r="75" fill="none" stroke="#475569" stroke-dasharray="4 4" />

  <!-- Outer Orbit (Clockwise) -->
  <g class="orbit-cw">
    <!-- React -->
    <g transform="translate(180, 180) rotate(0) translate(120, 0)">
      <circle r="18" fill="#1e293b" stroke="#61dafb" stroke-width="2" />
      <text text-anchor="middle" dy="4" font-size="10" fill="#61dafb" font-weight="bold">React</text>
    </g>
    <!-- Node -->
    <g transform="translate(180, 180) rotate(120) translate(120, 0)">
      <circle r="18" fill="#1e293b" stroke="#339933" stroke-width="2" />
      <text text-anchor="middle" dy="4" font-size="9" fill="#339933" font-weight="bold">Node</text>
    </g>
    <!-- Python -->
    <g transform="translate(180, 180) rotate(240) translate(120, 0)">
      <circle r="18" fill="#1e293b" stroke="#3776ab" stroke-width="2" />
      <text text-anchor="middle" dy="4" font-size="9" fill="#3776ab" font-weight="bold">Py</text>
    </g>
  </g>

  <!-- Inner Orbit (Counter-Clockwise) -->
  <g class="orbit-ccw">
    <!-- TS -->
    <g transform="translate(180, 180) rotate(45) translate(75, 0)">
      <circle r="15" fill="#1e293b" stroke="#3178c6" stroke-width="2" />
      <text text-anchor="middle" dy="4" font-size="10" fill="#3178c6" font-weight="bold">TS</text>
    </g>
    <!-- CSS -->
    <g transform="translate(180, 180) rotate(165) translate(75, 0)">
      <circle r="15" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
      <text text-anchor="middle" dy="4" font-size="9" fill="#38bdf8" font-weight="bold">CSS</text>
    </g>
    <!-- Mongo -->
    <g transform="translate(180, 180) rotate(285) translate(75, 0)">
      <circle r="15" fill="#1e293b" stroke="#47a248" stroke-width="2" />
      <text text-anchor="middle" dy="4" font-size="8" fill="#47a248" font-weight="bold">MDB</text>
    </g>
  </g>

  <!-- Pulsing Center Core -->
  <circle cx="180" cy="180" r="26" class="pulse-core" fill="url(#neonGrad)" />
  <text x="180" y="184" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold" letter-spacing="1">DEV</text>

  <!-- RIGHT SIDE: TERMINAL -->
  <!-- Terminal Box -->
  <rect x="360" y="30" width="410" height="300" fill="#0b0f19" rx="8" stroke="#1e293b" stroke-width="1.5" />
  
  <!-- Terminal Header -->
  <rect x="360" y="30" width="410" height="30" fill="#161b22" rx="8" />
  <circle cx="380" cy="45" r="5" fill="#ff5f56" />
  <circle cx="395" cy="45" r="5" fill="#ffbd2e" />
  <circle cx="410" cy="45" r="5" fill="#27c93f" />
  <text x="565" y="50" fill="#8b949e" font-size="11" text-anchor="middle">charan@terminal: ~</text>

  <!-- Terminal Content -->
  <!-- Line 1 -->
  <text x="380" y="90" fill="#f85d7f" font-size="13" font-weight="bold">> neofetch</text>
  
  <!-- System Info -->
  <text x="380" y="120" fill="#58a6ff" font-size="12" font-weight="bold">Charan Karthik M</text>
  <text x="380" y="140" fill="#8b949e" font-size="12">-----------------</text>
  
  <text x="380" y="165" fill="#8b949e" font-size="12">Role:     <tspan fill="#c9d1d9">Full-Stack Software Engineer &amp; Designer</tspan></text>
  <text x="380" y="185" fill="#8b949e" font-size="12">Location: <tspan fill="#c9d1d9">Chennai, India 🇮🇳</tspan></text>
  <text x="380" y="205" fill="#8b949e" font-size="12">Focus:    <tspan fill="#a5d6ff">Civic Tech, AI Integrations, WebSockets</tspan></text>
  <text x="380" y="225" fill="#8b949e" font-size="12">Vibe:     <tspan fill="#ff7b72">Turning flowcharts into pixel-perfect code</tspan></text>
  
  <!-- Pulse green work status -->
  <text x="380" y="260" fill="#8b949e" font-size="12">Status:   </text>
  <circle cx="445" cy="256" r="6" fill="#39d353" style="animation: pulse-green 2s infinite;" />
  <text x="458" y="260" fill="#39d353" font-size="12" font-weight="bold">Open to Opportunities</text>

  <!-- Live Typing line -->
  <text x="380" y="300" fill="#22c55e" font-size="13" font-weight="bold">> compiling awesome_projects.js...</text>
  <rect x="668" y="287" width="8" height="15" fill="#22c55e" class="blink-cursor" />
</svg>
